<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram OTP Login 2FA</title>
<style>
body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#e0f7fa;margin:0;}
.login-container{background:#fff;border-radius:20px;width:380px;padding:40px;text-align:center;box-shadow:0 12px 30px rgba(0,0,0,0.2);}
h2{margin-bottom:20px;color:#333;}
input,button{width:100%;padding:12px;margin:10px 0;border-radius:10px;font-size:16px;}
button{background:#0088cc;color:white;border:none;cursor:pointer;}
button:hover{background:#006fa1;}
#message{font-size:14px;color:#333;margin-top:10px;}
</style>
</head>
<body>

<div class="login-container">
  <h2>Telegram OTP Login 2FA</h2>

  <div id="step-phone">
    <input type="text" id="phone" placeholder="Phone number">
    <button id="btn-next">Send OTP</button>
  </div>

  <div id="step-otp" style="display:none;">
    <input type="text" id="otp" placeholder="OTP code">
    <input type="password" id="password" placeholder="2FA password" style="display:none;">
    <button id="btn-login">Login</button>
  </div>

  <p id="message"></p>
</div>

<script>
const stepPhone=document.getElementById('step-phone');
const stepOtp=document.getElementById('step-otp');
const message=document.getElementById('message');
const btnNext=document.getElementById('btn-next');
const btnLogin=document.getElementById('btn-login');
const passwordInput=document.getElementById('password');

btnNext.addEventListener('click',async()=>{
  const phone=document.getElementById('phone').value.trim();
  if(!phone){message.textContent='Enter phone number';return;}
  message.textContent='Sending OTP...';
  try{
    const res=await fetch('/send-otp',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone})
    });
    const data=await res.json();
    if(data.success){
      stepPhone.style.display='none';
      stepOtp.style.display='block';
      message.textContent=data.message;
    } else message.textContent=data.message;
  }catch(err){message.textContent='Server error';}
});

btnLogin.addEventListener('click',async()=>{
  const phone=document.getElementById('phone').value.trim();
  const otp=document.getElementById('otp').value.trim();
  const password=passwordInput.value.trim();
  if(!otp){message.textContent='Enter OTP';return;}
  message.textContent='Verifying...';
  try{
    const res=await fetch('/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone,otp,password})
    });
    const data=await res.json();
    if(data.requirePassword){
      passwordInput.style.display='block';
      message.textContent='2FA password required';
    } else if(data.success){
      message.textContent=data.message;
      // Auto clear
      document.getElementById('otp').value='';
      passwordInput.value='';
    } else{
      message.textContent=data.message;
    }
  }catch(err){message.textContent='Server error';}
});
</script>

</body>
</html>
